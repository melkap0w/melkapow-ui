    <script>
      (function () {
        function getQueryParam(name) {
          var search = window.location.search || "";
          if (search.charAt(0) === "?") search = search.substring(1);
          if (!search) return "";

          var parts = search.split("&");
          for (var i = 0; i < parts.length; i++) {
            var kv = parts[i].split("=");
            var k = decodeURIComponent(kv[0] || "");
            if (k !== name) continue;
            return decodeURIComponent(kv.slice(1).join("=") || "");
          }
          return "";
        }

        var id = getQueryParam("id");
        id = (id || "").replace(/[^a-zA-Z0-9_-]/g, "");
        if (id) window.location.replace("index.html#gallery-" + id);
        else window.location.replace("index.html#work");
      })();
    </script>

      /* Slider base (works with your existing design; tweak if needed) */
      .art-slider { position: relative; width: 100%; }
      .art-slider .slides {
        display: flex;
        overflow: hidden;
        border-radius: 8px;
      }
      .art-slider .slides-track {
        display: flex;
        width: 100%;
        transition: transform 240ms ease;
      }
      .art-slider .slide {
        min-width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .art-slider img {
        width: 100%;
        height: auto;
        max-height: 70vh;   /* consistent sizing */
        object-fit: contain;
      }
      .art-slider .navbtn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        border: 0;
        background: rgba(0,0,0,0.35);
        color: #fff;
        width: 44px;
        height: 44px;
        border-radius: 999px;
        cursor: pointer;
        display: grid;
        place-items: center;
      }
      .art-slider .navbtn.prev { left: 10px; }
      .art-slider .navbtn.next { right: 10px; }

      .art-dots {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-top: 12px;
      }
      .art-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.6);
        background: transparent;
        cursor: pointer;
      }
      .art-dot.is-active { background: rgba(255,255,255,0.85); }
