name: E2E (Playwright)

on:
  pull_request:
    branches: ["main", "dev"]
  push:
    branches: ["main", "dev"]
  workflow_dispatch:
    inputs:
      api_base:
        description: Optional override. Leave blank to auto-pick (main=prod, dev=dev).
        required: false
        default: ""
      warmup_max_ms:
        description: Optional override (ms). Leave blank for defaults (prod=45000, dev=180000).
        required: false
        default: ""
      warmup_attempt_timeout_ms:
        description: Optional per-attempt timeout (ms). Leave blank for defaults (prod=8000, dev=20000).
        required: false
        default: ""

jobs:
  smoke:
    name: Smoke (offline-safe)
    runs-on: ubuntu-22.04
    container:
      # Keep this tag in sync with `package-lock.json` (@playwright/test) to avoid browser/version mismatches.
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
      options: --ipc=host
    timeout-minutes: 15
    env:
      # Avoid flaky IPv6-first DNS resolution in CI.
      NODE_OPTIONS: --dns-result-order=ipv4first

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        env:
          # Browsers + OS deps are preinstalled in the Playwright container image.
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: npm ci

      - name: Run Playwright smoke tests
        run: npm run e2e:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: playwright-report
          retention-days: 7

  deployed_api:
    name: Deployed API warm-up + E2E
    runs-on: ubuntu-22.04
    container:
      # Keep this tag in sync with `package-lock.json` (@playwright/test) to avoid browser/version mismatches.
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
      options: --ipc=host
    timeout-minutes: 20
    if: github.event_name != 'pull_request'
    env:
      # Avoid flaky IPv6-first DNS resolution in CI.
      NODE_OPTIONS: --dns-result-order=ipv4first

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        env:
          # Browsers + OS deps are preinstalled in the Playwright container image.
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: npm ci

      - name: Resolve API base (main=prod, dev=dev)
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            api_base="${{ github.event.inputs.api_base }}"
            warmup_max_ms="${{ github.event.inputs.warmup_max_ms }}"
            warmup_attempt_timeout_ms="${{ github.event.inputs.warmup_attempt_timeout_ms }}"

            if [[ -n "${api_base}" ]]; then
              echo "E2E_API_BASE=${api_base}" >> "$GITHUB_ENV"
            elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
              echo "E2E_API_BASE=http://localhost:8000" >> "$GITHUB_ENV"
            else
              echo "E2E_API_BASE=http://localhost:8000" >> "$GITHUB_ENV"
            fi

            if [[ -n "${warmup_max_ms}" ]]; then
              echo "E2E_WARMUP_MAX_MS=${warmup_max_ms}" >> "$GITHUB_ENV"
            elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
              echo "E2E_WARMUP_MAX_MS=45000" >> "$GITHUB_ENV"
            else
              echo "E2E_WARMUP_MAX_MS=180000" >> "$GITHUB_ENV"
            fi

            if [[ -n "${warmup_attempt_timeout_ms}" ]]; then
              echo "E2E_WARMUP_ATTEMPT_TIMEOUT_MS=${warmup_attempt_timeout_ms}" >> "$GITHUB_ENV"
            elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
              echo "E2E_WARMUP_ATTEMPT_TIMEOUT_MS=8000" >> "$GITHUB_ENV"
            else
              echo "E2E_WARMUP_ATTEMPT_TIMEOUT_MS=20000" >> "$GITHUB_ENV"
            fi
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "E2E_API_BASE=http://localhost:8000" >> "$GITHUB_ENV"
            echo "E2E_WARMUP_MAX_MS=45000" >> "$GITHUB_ENV"
            echo "E2E_WARMUP_ATTEMPT_TIMEOUT_MS=8000" >> "$GITHUB_ENV"
          else
            echo "E2E_API_BASE=http://localhost:8000" >> "$GITHUB_ENV"
            echo "E2E_WARMUP_MAX_MS=180000" >> "$GITHUB_ENV"
            echo "E2E_WARMUP_ATTEMPT_TIMEOUT_MS=20000" >> "$GITHUB_ENV"
          fi

          echo "E2E_WARMUP_ENABLED=true" >> "$GITHUB_ENV"
          echo "E2E_TEST_TIMEOUT_MS=180000" >> "$GITHUB_ENV"

      - name: Debug API health
        run: |
          echo "Testing API health endpoint..."
          echo "E2E_API_BASE=${E2E_API_BASE}"
          curl -v --connect-timeout 5 --max-time 25 "${E2E_API_BASE}/api/health" || true

      - name: Run deployed API tests (includes warm-up)
        run: npm run e2e:dev

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-deployed-api
          path: playwright-report
          retention-days: 7
